  \ query --repo <path> \"query\"\n   - trifecta daemon start|stop|status|restart --repo <path>\n\nRecovery\
  \ test detail:\n# 1. Start daemon\nrunner = CliRunner()\nresult = runner.invoke(daemon_start, [\"--repo\"\
