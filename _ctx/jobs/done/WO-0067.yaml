risks:
- A false fix makes finish pass only from one cwd while still failing from the other
  supported topology
- Dirty-state checks get blurred with missing-running detection, hiding the actual
  operator action required
- Scope creeps into authority or pending semantics instead of staying on finish topology
definition_of_done:
- The official ctx_wo_finish.py closure flow is demonstrated from the remediation
  tree and from the WO child worktree against the live running WO path.
- Missing-running, dirty-state, and unsupported-topology failures are distinguishable
  and covered by automated tests.
- Verification evidence captures command, cwd, expected running path, and final result
  for the supported closure flow.
- Verify commands pass.
rollback_note: Revert finish-topology changes only; do not widen scope into authority,
  pending semantics, or worktree redesign.
