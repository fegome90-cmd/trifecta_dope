objective: Correct finish runtime resolution so ctx_wo_finish.py operates on the live
  running WO in the supported remediation topology, both from the remediation tree
  and from the WO child worktree.
deliverables:
- Minimal runtime-root/running-WO resolution fix for finish closure in remediation
  worktrees
- Tests covering supported topologies and error separation for missing-running vs
  dirty-state failures
- Verification evidence showing the official ctx_wo_finish.py flow from both supported
  cwd topologies
acceptance_criteria:
- ctx_wo_finish.py resolves the live running WO correctly when invoked from the remediation
  tree and from the WO child worktree.
- The command fails with the correct error when the WO is not actually running, when
  the applicable tree is dirty, and when the WO belongs to an unsupported topology.
- The fix does not add side effects to src/application/wo_authority.py and does not
  move shared-authority responsibilities out of their current role.
- Automated tests cover runtime-root/running-path resolution, separation between missing-running
  and dirty-state gates, and one successful closure path in a supported remediation
  topology.
- Verification evidence records the exact commands, cwd, expected running-WO path,
  and final closure outcome.
out_of_scope:
- Changes to pending semantics or draft/take-ready rules
- Rewrites of shared authority behavior
- Corpus migration or historical cleanup
- Broad worktree refactors or new infrastructure
- Cosmetic doc-only edits unrelated to the finish flow
artifacts:
